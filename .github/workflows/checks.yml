name: Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.16.0"

jobs:
  checks:
    name: Install, verify, and bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm run verify

      - name: Incremental production-shaped gate
        run: pnpm run benchmark:incremental:gate

      - name: Bundle
        run: pnpm run bundle
