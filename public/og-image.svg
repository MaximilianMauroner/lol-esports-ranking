<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LoL Esports Power Index</title>
  <desc id="desc">Dark dashboard preview for model-versioned League of Legends esports rankings.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1114" />
      <stop offset="1" stop-color="#122025" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf" />
      <stop offset="1" stop-color="#f7c948" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.45" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#surface)" />
  <rect x="58" y="54" width="1084" height="522" rx="28" fill="#101a1f" stroke="#294047" filter="url(#soft-shadow)" />
  <g transform="translate(100 96)">
    <circle cx="38" cy="38" r="38" fill="#15272d" stroke="#2dd4bf" stroke-width="4" />
    <path d="M38 14 L58 66 H46 L42 54 H25 L21 66 H9 L30 14 Z M29 43 H39 L34 27 Z" fill="#f7c948" />
    <text x="98" y="31" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">LoL Esports</text>
    <text x="98" y="66" fill="#8fb3ba" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">Power Index</text>
  </g>
  <text x="100" y="236" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="62" font-weight="760">Team and Region Rankings</text>
  <text x="100" y="296" fill="#b6c8cc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28">Model-versioned power scores with transparent source coverage.</text>
  <g transform="translate(100 368)">
    <rect width="1000" height="104" rx="18" fill="#0d1519" stroke="#294047" />
    <rect x="30" y="30" width="240" height="16" rx="8" fill="url(#accent)" />
    <rect x="30" y="62" width="150" height="12" rx="6" fill="#40656b" />
    <rect x="330" y="30" width="210" height="16" rx="8" fill="#2dd4bf" opacity="0.82" />
    <rect x="330" y="62" width="132" height="12" rx="6" fill="#40656b" />
    <rect x="600" y="30" width="260" height="16" rx="8" fill="#f7c948" opacity="0.9" />
    <rect x="600" y="62" width="190" height="12" rx="6" fill="#40656b" />
  </g>
  <text x="100" y="532" fill="#6f8f95" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">lol-esports-power-index.up.railway.app</text>
</svg>
