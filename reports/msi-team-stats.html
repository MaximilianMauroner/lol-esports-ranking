.team-head { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; padding: 16px; background: var(--panel-2); border-bottom: 1px solid var(--line); }

.meta { color: var(--muted); font-size: 13px; }
.metrics { display: grid; grid-template-columns: repeat(6, minmax(110px, 1fr)); gap: 8px; padding: 14px 16px; }
.metric { background: #141720; border: 1px solid var(--line); border-radius: 6px; padding: 9px; }

.metric b { font-size: 16px; }
.section { padding: 0 16px 16px; }
.section h3 { margin: 10px 0; font-size: 15px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: var(--chip); color: var(--text); border: 1px solid var(--line); padding: 4px 7px; border-radius: 999px; font-size: 12px; }
.reason { max-width: 560px; color: #d7dbe2; line-height: 1.35; }
.small-table { min-width: 760px; font-size: 13px; }
.hidden { display: none; }

const report = JSON.parse(document.getElementById('report-data').textContent);
let showLedger = false;
const state = { search: '', sort: 'rank' };
const byId = (id) => document.getElementById(id);
byId('search').addEventListener('input', (event) => { state.search = event.target.value.toLowerCase(); render(); });
byId('sort').addEventListener('change', (event) => { state.sort = event.target.value; render(); });

function filteredTeams() {
  const teams = report.teams.filter((team) => {
    const haystack = [team.team, team.code, team.region, team.league, ...team.recentMatches.map((match) => match.opponent)].join(' ').toLowerCase();
    return haystack.includes(state.search);
  });

    if (state.sort === 'delta') return b.delta - a.delta || a.rank - b.rank;
    if (state.sort === 'rating') return b.rating - a.rating || a.rank - b.rank;
    if (state.sort === 'movement') return b.movement - a.movement || a.rank - b.rank;
    return a.rank - b.rank;
  });
}
function render() {
  const teams = filteredTeams();
  renderSummary(teams);
  renderTable(teams);
  renderCards(teams);
}
function renderSummary(teams) {
  const games = teams.reduce((total, team) => total + team.recentMatches.filter((match) => match.event === 'MSI 2026').reduce((inner, match) => inner + (match.games || 1), 0), 0);
  const bestDelta = [...teams].sort((a, b) => b.delta - a.delta)[0];
  const worstDelta = [...teams].sort((a, b) => a.delta - b.delta)[0];
  byId('summaryCards').innerHTML = [
    card('MSI teams', teams.length),
    card('MSI recent games', games),
    card('Largest power gain', bestDelta ? bestDelta.code + ' +' + bestDelta.delta : '-'),
    card('Largest power loss', worstDelta ? worstDelta.code + ' ' + worstDelta.delta : '-'),
  ].join('');
}
function renderTable(teams) {
  byId('teamTable').innerHTML = '<thead><tr><th>Rank</th><th>Team</th><th>Region</th><th class="num">Power</th><th class="num">Delta</th><th class="num">W-L</th><th class="num">Move</th><th>Strongest</th><th>Eligibility</th></tr></thead><tbody>' +
    teams.map((team) => '<tr><td class="num">#' + team.rank + '</td><td><b>' + esc(team.team) + '</b><div class="meta">' + esc(team.code) + '</div></td><td>' + esc(team.region) + '<div class="meta">' + esc(team.league) + '</div></td><td class="num">' + team.rating + '</td><td class="num ' + signedClass(team.delta) + '">' + signed(team.delta) + '</td><td class="num">' + team.wins + '-' + team.losses + '</td><td class="num ' + signedClass(-team.movement) + '">' + signed(-team.movement) + '</td><td>' + esc(team.strongestFactor) + '</td><td>' + eligibility(team) + '</td></tr>').join('') + '</tbody>';
}
function renderCards(teams) {
  byId('teamCards').innerHTML = teams.map(teamCard).join('');
}
function teamCard(team) {
  const components = Object.entries(team.ratingComponents).map(([key, value]) => '<span class="chip">' + esc(key) + ': ' + value + '</span>').join('');
  const factors = Object.entries(team.factors).map(([key, value]) => '<span class="chip">' + esc(key) + ': ' + Math.round(value * 100) + '</span>').join('');
  return '<article class="team-card"><div class="team-head"><div class="team-title"><h2>#' + team.rank + ' ' + esc(team.team) + ' <span class="meta">' + esc(team.code) + '</span></h2><div class="meta">' + esc(team.region) + ' / ' + esc(team.league) + ' / ' + team.wins + '-' + team.losses + '</div></div><div class="meta">Power ' + team.rating + ' (' + signed(team.delta) + '), previous rank #' + team.previousRank + '</div></div>' +
    '<div class="metrics">' + metric('Power', team.rating) + metric('Previous', team.previousRating) + metric('Delta', signed(team.delta), signedClass(team.delta)) + metric('Confidence', team.confidence) + metric('Uncertainty', team.uncertainty) + metric('Movement', signed(-team.movement), signedClass(-team.movement)) + '</div>' +
    '<div class="section"><h3>Rating components</h3><div class="chips">' + components + '</div></div>' +
    '<div class="section"><h3>Factor scores</h3><div class="chips">' + factors + '</div></div>' +
    '<div class="section"><h3>Recent series</h3><div class="table-wrap"><table class="small-table"><thead><tr><th>Date</th><th>Event</th><th>Opponent</th><th>Result</th><th class="num">Score</th><th class="num">Power delta</th><th>Reason</th></tr></thead><tbody>' + team.recentMatches.map(matchRow).join('') + '</tbody></table></div></div>' +
    '<div class="section"><h3>MSI grouped model ledger</h3><div class="table-wrap"><table class="small-table"><thead><tr><th>Date</th><th>Opponent</th><th>Result</th><th class="num">Games</th><th class="num">Internal delta</th><th>Final update reason</th></tr></thead><tbody>' + team.msiSeries.map(seriesRow).join('') + '</tbody></table></div></div>' +
    '<div class="section ' + (showLedger ? '' : 'hidden') + '"><h3>Last raw model updates</h3><div class="table-wrap"><table class="small-table"><thead><tr><th>Date</th><th>Event</th><th>Opponent</th><th>Result</th><th class="num">Delta</th><th class="num">Stable</th><th class="num">League</th><th class="num">Momentum</th><th>Reason</th></tr></thead><tbody>' + team.recentUpdateLedger.map(updateRow).join('') + '</tbody></table></div></div>' +
  '</article>';
}
function matchRow(match) {
  const score = match.wins !== undefined && match.losses !== undefined ? match.wins + '-' + match.losses : match.result;
  return '<tr><td>' + esc(match.date) + '</td><td>' + esc(match.event) + '</td><td>' + esc(match.opponent) + '</td><td class="' + resultClass(match.result) + '">' + esc(match.result) + '</td><td class="num">' + score + '</td><td class="num ' + signedClass(match.delta || 0) + '">' + signed(match.delta || 0) + '</td><td class="reason">' + esc(match.reason) + '</td></tr>';
}
function seriesRow(series) {
  return '<tr><td>' + esc(series.date) + '</td><td>' + esc(series.opponent) + '</td><td class="' + resultClass(series.result) + '">' + esc(series.result) + ' ' + esc(series.score) + '</td><td class="num">' + series.games + '</td><td class="num ' + signedClass(series.delta) + '">' + signed(series.delta) + '</td><td class="reason">' + esc(series.reason) + '</td></tr>';
}
function updateRow(update) {
  return '<tr><td>' + esc(update.date) + '</td><td>' + esc(update.event) + '</td><td>' + esc(update.opponent) + '</td><td class="' + resultClass(update.result) + '">' + esc(update.result) + '</td><td class="num ' + signedClass(update.internalDelta) + '">' + signed(update.internalDelta) + '</td><td class="num ' + signedClass(update.teamStableDelta) + '">' + signed(update.teamStableDelta) + '</td><td class="num ' + signedClass(update.leagueGameDelta + update.leaguePlacementDelta) + '">' + signed(update.leagueGameDelta + update.leaguePlacementDelta) + '</td><td class="num ' + signedClass(update.momentumDelta) + '">' + signed(update.momentumDelta) + '</td><td class="reason">' + esc(update.reason) + '</td></tr>';
}
function card(label, value) { return '<div class="card"><span class="meta">' + esc(label) + '</span><b>' + esc(String(value)) + '</b></div>'; }
function metric(label, value, cls) { return '<div class="metric"><span>' + esc(label) + '</span><b class="' + (cls || '') + '">' + esc(String(value)) + '</b></div>'; }
function eligibility(team) { return team.eligibility.eligible ? '<span class="good">eligible</span>' : '<span class="bad">' + esc((team.eligibility.reasons || []).join(', ')) + '</span>'; }
function signed(value) { const number = Number(value || 0); return number > 0 ? '+' + number : String(number); }
function signedClass(value) { const number = Number(value || 0); return number > 0 ? 'good' : number < 0 ? 'bad' : ''; }
function resultClass(value) { return value === 'W' ? 'good' : value === 'L' ? 'bad' : 'warn'; }
function esc(value) { return String(value ?? '').replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char])); }
</script>

</html>
